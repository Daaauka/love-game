<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Найди моё сердце ❤️</title>

<style>

body{
margin:0;
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}

h1{
margin-top:40px;
font-size:30px;
}

.game{
display:grid;
grid-template-columns:repeat(3,110px);
gap:20px;
justify-content:center;
margin-top:50px;
}

.box{
width:110px;
height:110px;
background:#2b2b2b;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
transition:0.2s;
animation:shake 2s infinite;
}

.box:hover{
transform:scale(1.1);
background:#444;
}

@keyframes shake{
0%{transform:rotate(0deg)}
25%{transform:rotate(2deg)}
50%{transform:rotate(0deg)}
75%{transform:rotate(-2deg)}
100%{transform:rotate(0deg)}
}

#win{
display:none;
margin-top:30px;
animation:fade 1.5s;
}

img{
width:80%;
max-width:320px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 25px rgba(255,0,100,0.6);
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

.heart{
position:absolute;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
0%{
transform:translateY(-10vh);
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<h1>Найди моё сердце ❤️</h1>

<div class="game">

<div class="box" onclick="pick(1)">🎁</div>
<div class="box" onclick="pick(2)">🎁</div>
<div class="box" onclick="pick(3)">🎁</div>
<div class="box" onclick="pick(4)">🎁</div>
<div class="box" onclick="pick(5)">🎁</div>
<div class="box" onclick="pick(6)">🎁</div>

</div>

<div id="win">

<h2>Ты нашла моё сердце ❤️</h2>
<p>И оно принадлежит тебе</p>

<img src="photo.jpg">

</div>

<script>

let heart = Math.floor(Math.random()*6)+1;

function pick(num){

if(num===heart){

document.getElementById("win").style.display="block";
startHearts();

}else{

alert("Тут нет сердца... попробуй ещё ❤️");

}

}

function startHearts(){

for(let i=0;i<50;i++){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=2+Math.random()*3+"s";

document.body.appendChild(heart);

}

}

</script>

</body>
</html>
